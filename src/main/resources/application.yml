server:
  port: 9091

spring:
  application:
    name: Agri-Link-back
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${AGRILINK_DB_HOST:localhost}:${AGRILINK_DB_PORT:3306}/${AGRILINK_DB_NAME:rongxiaotong}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${AGRILINK_DB_USERNAME:root}
    password: ${AGRILINK_DB_PASSWORD:200526}
  mail:
    host: smtp.163.com
    port: 465
    username: ${AGRILINK_MAIL_USERNAME:15828824107@163.com}
    password: ${AGRILINK_MAIL_AUTH_CODE:JJSUaimFuAuRVJCV}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  web:
    resources:
      static-locations: file:${application.upload-path}/
  mvc:
    static-path-pattern: /files/**

application:
  upload-path: ${AGRILINK_UPLOAD_PATH:./uploads}
  security:
    jwt:
      # 生产请用环境变量覆盖；至少 32 字节以满足 HS256 密钥长度要求。
      secret: ${AGRILINK_JWT_SECRET:AgriLink-Jwt-Secret-Key-ChangeMe-32B!}
      # 访问令牌有效期（小时），默认 24h。
      expire-hours: ${AGRILINK_JWT_EXPIRE_HOURS:24}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.agrilinkback.**.entity
  configuration:
    map-underscore-to-camel-case: true

bank:
  bankid: 1001

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
