spring:
  datasource:
    url: jdbc:h2:mem:agrilink;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
      data-locations: classpath:data-test.sql
application:
  upload-path: ${java.io.tmpdir}/agrilink-test-uploads
